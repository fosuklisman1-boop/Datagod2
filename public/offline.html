<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — DATAGOD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #0f1117;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      padding: 13px 32px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      letter-spacing: -0.1px;
    }
    .btn:hover  { background: #4f46e5; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #334155;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1    { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <div class="brand">DATAGOD</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Check your data or Wi-Fi and try again — your session is still safe.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
    <p class="note">Your wallet balance and order history will load once you're back online.</p>
  </div>
</body>
</html>
